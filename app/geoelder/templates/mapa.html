<div id="map" style="height:600px;"></div>

<script>
var map = L.map('map').setView([41.55, -8.42], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var markers = {};

function atualizar() {
    fetch('/api/localizacoes/')
    .then(res => res.json())
    .then(data => {

        data.forEach(i => {

            if (markers[i.id]) {
                map.removeLayer(markers[i.id]);
            }

            var cor = i.dentro ? "green" : "red";

            var marker = L.circleMarker([i.lat, i.lng], {
                color: cor,
                radius: 8
            }).addTo(map);

            marker.bindPopup(`
                <b>${i.nome}</b><br>
                Passos: ${i.passos}<br>
                Distância: ${i.distancia}m
            `);

            markers[i.id] = marker;
        });
    });
}

setInterval(atualizar, 5000);
atualizar();
</script>
